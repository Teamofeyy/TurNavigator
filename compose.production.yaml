services:
  postgres:
    image: postgres:18.3
    container_name: travelcontext-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travelcontext}
      POSTGRES_USER: ${POSTGRES_USER:-travelcontext}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travelcontext}
    volumes:
      - travelcontext_postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-travelcontext} -d ${POSTGRES_DB:-travelcontext}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-travelcontext/travelcontext-backend}:${IMAGE_TAG:-latest}
    container_name: travelcontext-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-travelcontext}:${POSTGRES_PASSWORD:-travelcontext}@postgres:5432/${POSTGRES_DB:-travelcontext}
      SQLALCHEMY_ECHO: ${SQLALCHEMY_ECHO:-false}
      OPENTRIPMAP_API_KEY: ${OPENTRIPMAP_API_KEY:-}
      OVERPASS_ENDPOINT: ${OVERPASS_ENDPOINT:-https://overpass-api.de/api/interpreter}
      WIKIPEDIA_LANGUAGE: ${WIKIPEDIA_LANGUAGE:-ru}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:8000/health').status == 200 else 1)\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE:-travelcontext/travelcontext-frontend}:${IMAGE_TAG:-latest}
    container_name: travelcontext-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_API_URL: http://backend:8000
      OPENROUTESERVICE_API_KEY: ${OPENROUTESERVICE_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    image: caddy:2.10-alpine
    container_name: travelcontext-caddy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      pgadmin:
        condition: service_started
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      PGADMIN_DOMAIN: ${PGADMIN_DOMAIN:-pgadmin.localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: travelcontext-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "True"
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PROTO_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PORT_COUNT: 1
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  travelcontext_postgres_data:
  pgadmin_data:
  caddy_data:
  caddy_config:
