name: ci-cd

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        run: pip install uv

      - name: Sync backend dependencies
        working-directory: backend
        run: UV_CACHE_DIR=../.uv-cache uv sync --frozen --all-groups

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run pre-commit checks
        working-directory: backend
        run: UV_CACHE_DIR=../.uv-cache uv run pre-commit run --all-files --config ../.pre-commit-config.yaml --show-diff-on-failure

      - name: Run backend tests
        working-directory: backend
        run: UV_CACHE_DIR=../.uv-cache uv run pytest

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request' && vars.DOCKERHUB_USERNAME != ''

    permissions:
      contents: read

    env:
      BACKEND_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/travelcontext-backend
      FRONTEND_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/travelcontext-frontend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    env:
      APP_DIR: ${{ secrets.VDS_APP_DIR }}
      BACKEND_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/travelcontext-backend
      FRONTEND_IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/travelcontext-frontend
      IMAGE_TAG: ${{ github.sha }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOMAIN: ${{ secrets.DOMAIN }}
      PGADMIN_DOMAIN: ${{ secrets.PGADMIN_DOMAIN }}
      ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      PGADMIN_DEFAULT_EMAIL: ${{ secrets.PGADMIN_DEFAULT_EMAIL }}
      PGADMIN_DEFAULT_PASSWORD: ${{ secrets.PGADMIN_DEFAULT_PASSWORD }}
      SQLALCHEMY_ECHO: ${{ secrets.SQLALCHEMY_ECHO }}
      OPENTRIPMAP_API_KEY: ${{ secrets.OPENTRIPMAP_API_KEY }}
      OVERPASS_ENDPOINT: ${{ secrets.OVERPASS_ENDPOINT }}
      WIKIPEDIA_LANGUAGE: ${{ secrets.WIKIPEDIA_LANGUAGE }}
      OPENROUTESERVICE_API_KEY: ${{ secrets.OPENROUTESERVICE_API_KEY }}
      HTTP_PORT: "80"
      HTTPS_PORT: "443"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare deployment directories
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          script: |
            mkdir -p "${{ env.APP_DIR }}/deploy/caddy"

      - name: Upload deployment files
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          source: "compose.production.yaml,deploy/caddy/Caddyfile"
          target: ${{ env.APP_DIR }}
          overwrite: true

      - name: Deploy on VDS
        uses: appleboy/ssh-action@v1
        env:
          APP_DIR: ${{ env.APP_DIR }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ env.DOCKERHUB_TOKEN }}
          DOMAIN: ${{ env.DOMAIN }}
          PGADMIN_DOMAIN: ${{ env.PGADMIN_DOMAIN }}
          ACME_EMAIL: ${{ env.ACME_EMAIL }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          PGADMIN_DEFAULT_EMAIL: ${{ env.PGADMIN_DEFAULT_EMAIL }}
          PGADMIN_DEFAULT_PASSWORD: ${{ env.PGADMIN_DEFAULT_PASSWORD }}
          SQLALCHEMY_ECHO: ${{ env.SQLALCHEMY_ECHO }}
          OPENTRIPMAP_API_KEY: ${{ env.OPENTRIPMAP_API_KEY }}
          OVERPASS_ENDPOINT: ${{ env.OVERPASS_ENDPOINT }}
          WIKIPEDIA_LANGUAGE: ${{ env.WIKIPEDIA_LANGUAGE }}
          OPENROUTESERVICE_API_KEY: ${{ env.OPENROUTESERVICE_API_KEY }}
          HTTP_PORT: ${{ env.HTTP_PORT }}
          HTTPS_PORT: ${{ env.HTTPS_PORT }}
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          envs: APP_DIR,BACKEND_IMAGE,FRONTEND_IMAGE,IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DOMAIN,PGADMIN_DOMAIN,ACME_EMAIL,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,PGADMIN_DEFAULT_EMAIL,PGADMIN_DEFAULT_PASSWORD,SQLALCHEMY_ECHO,OPENTRIPMAP_API_KEY,OVERPASS_ENDPOINT,WIKIPEDIA_LANGUAGE,OPENROUTESERVICE_API_KEY,HTTP_PORT,HTTPS_PORT
          script: |
            set -eu
            mkdir -p "$APP_DIR/deploy/caddy"
            cd "$APP_DIR"

            cat > .env <<EOF
            DOMAIN=$DOMAIN
            PGADMIN_DOMAIN=$PGADMIN_DOMAIN
            ACME_EMAIL=$ACME_EMAIL
            HTTP_PORT=$HTTP_PORT
            HTTPS_PORT=$HTTPS_PORT
            POSTGRES_DB=$POSTGRES_DB
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            PGADMIN_DEFAULT_EMAIL=$PGADMIN_DEFAULT_EMAIL
            PGADMIN_DEFAULT_PASSWORD=$PGADMIN_DEFAULT_PASSWORD
            BACKEND_IMAGE=$BACKEND_IMAGE
            FRONTEND_IMAGE=$FRONTEND_IMAGE
            IMAGE_TAG=$IMAGE_TAG
            SQLALCHEMY_ECHO=$SQLALCHEMY_ECHO
            OPENTRIPMAP_API_KEY=$OPENTRIPMAP_API_KEY
            OVERPASS_ENDPOINT=$OVERPASS_ENDPOINT
            WIKIPEDIA_LANGUAGE=$WIKIPEDIA_LANGUAGE
            OPENROUTESERVICE_API_KEY=$OPENROUTESERVICE_API_KEY
            EOF

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker compose -f compose.production.yaml pull
            docker compose -f compose.production.yaml up -d --remove-orphans
            docker image prune -f
